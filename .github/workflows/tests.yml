name: test

on: push

jobs:
    
  tests:
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      LLAMA2_API_KEY: ${{ secrets.LLAMA2_API_KEY }}
      GOOGLE_PROJECT_ID: ${{ secrets.GOOGLE_PROJECT_ID }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      
      - name: Setup python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Setup poetry
        uses: snok/install-poetry@v1

      - name: Install dependencies
        run: poetry lock --no-update && poetry install

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: 'projects/806914350455/locations/global/workloadIdentityPools/llm-proxy/providers/github'
          service_account: 'github-actions@poised-elf-400922.iam.gserviceaccount.com'

      - name: Run test suite
        run: poetry run pytest
